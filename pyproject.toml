[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "jarvis-runtime"
version = "0.1.0"
description = "Local gaze-grounded motion control runtime"
requires-python = ">=3.12"
dependencies = [
  "numpy>=1.26,<3",
]

[project.scripts]
jarvis-gaze = "jarvis.gaze.cli:main"

[project.optional-dependencies]
vision = [
  "mediapipe>=0.10,<0.11",
  "opencv-python>=4.9,<5",
]
ml = [
  "torch>=2.2,<3",
]
dev = [
  "pytest>=8,<9",
  "ruff>=0.9,<1",
  "mypy>=1.14,<2",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
src = ["src", "tests"]
line-length = 100

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["jarvis"]

# cv2 (OpenCV) is an optional `vision` extra and ships no type stubs; treat its
# imports as untyped whether or not it is installed in the current environment.
# MediaPipe is optional for the same camera-only boundary.
[[tool.mypy.overrides]]
module = ["cv2", "mediapipe.*"]
ignore_missing_imports = true

# torch is an optional `ml` extra isolated to jarvis.gesture_fusion.model (same
# import-boundary pattern as mediapipe above); its bundled stubs are incomplete
# under strict mode, so treat it as untyped rather than failing the whole build.
[[tool.mypy.overrides]]
module = ["torch", "torch.*"]
ignore_missing_imports = true
